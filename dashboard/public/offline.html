<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Offline — Nexus Xenon</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #FFF5E4;
      --text: #1A1A1A;
      --accent: #FF6B35;
      --border: #000;
      --card: #fff;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #050816;
        --text: #E0FFFF;
        --accent: #00F5FF;
        --border: rgba(0,245,255,0.35);
        --card: rgba(15,23,42,0.9);
      }
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 1.5rem;
      padding-top: env(safe-area-inset-top, 1.5rem);
      padding-bottom: env(safe-area-inset-bottom, 1.5rem);
      text-align: center;
      gap: 1.5rem;
    }

    .icon {
      font-size: clamp(3rem, 10vw, 5rem);
      line-height: 1;
    }

    .card {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      max-width: 420px;
      width: 100%;
      box-shadow: 4px 4px 0 var(--border);
    }

    @media (prefers-color-scheme: dark) {
      .card { box-shadow: 0 0 30px rgba(0,245,255,0.1); }
    }

    h1 {
      font-size: clamp(1.25rem, 5vw, 1.75rem);
      font-weight: 900;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }

    p {
      font-size: 0.875rem;
      line-height: 1.6;
      opacity: 0.75;
      margin-bottom: 1.5rem;
    }

    button {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      font-size: 0.875rem;
      font-weight: 900;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      background: var(--accent);
      color: #fff;
      border: 2px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 3px 3px 0 var(--border);
      transition: transform 0.1s, box-shadow 0.1s;
      touch-action: manipulation;
    }

    button:active {
      transform: translate(2px, 2px);
      box-shadow: 1px 1px 0 var(--border);
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      padding: 0.25rem 0.75rem;
      border: 2px solid var(--border);
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: transparent;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #EF4444;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }
  </style>
</head>
<body>
  <div class="icon">📡</div>

  <div class="card">
    <div class="status-badge" style="margin: 0 auto 1rem">
      <span class="dot"></span>
      <span>Offline</span>
    </div>
    <h1>No Connection</h1>
    <p>
      Nexus Xenon couldn't reach the server. Check your internet connection and try again.
      Your cached content may still be available.
    </p>
    <button onclick="window.location.reload()">
      🔄 Retry Connection
    </button>
  </div>

  <script>
    // Auto-retry when connection is restored
    window.addEventListener('online', () => window.location.reload());
  </script>
</body>
</html>
